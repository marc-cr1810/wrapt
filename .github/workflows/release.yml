name: Release

# Runs ONLY when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
# Ordinary commits and branch pushes never trigger this — see ci.yml for those.
on:
  push:
    tags:
      - "v*"

jobs:
  # One .deb per supported Ubuntu release. GitHub only hosts LTS runners, so the
  # non-hosted releases are built inside their official container images; each
  # build is packaged in its target's environment so dpkg-shlibdeps records that
  # release's real ABI floor (libc6/libgcc versions) in the package's Depends.
  build:
    name: build .deb (ubuntu ${{ matrix.release }})
    runs-on: ubuntu-latest
    container: ubuntu:${{ matrix.release }}
    strategy:
      fail-fast: false
      matrix:
        release: ["24.04", "25.04", "26.04"]
    steps:
      - name: Install build prerequisites
        run: |
          apt-get update
          # libstdc++6 is needed by the Node.js the runner injects for JS actions
          # (checkout, upload-artifact) into these bare Ubuntu containers.
          apt-get install -y --no-install-recommends \
            ca-certificates curl gcc git make dpkg-dev libstdc++6
          # Ubuntu's packaged cargo is too old for edition 2024; use rustup.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$tag  Cargo.toml=$cargo_ver"
          if [ "$tag" != "$cargo_ver" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $cargo_ver — bump Cargo.toml before tagging."
            exit 1
          fi

      - name: Run tests
        run: cargo test --all

      - name: Build .deb
        run: DEB_OS_TAG="ubuntu${{ matrix.release }}" ./scripts/build-deb.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu${{ matrix.release }}
          path: target/deb/*.deb
          if-no-files-found: error

  # Collect every build's .deb and publish them together as one GitHub Release.
  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all .debs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -l dist
          gh release create "$GITHUB_REF_NAME" \
            dist/*.deb \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
